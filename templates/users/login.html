{% extends 'base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                <h2 class="text-center mb-4">Вход</h2>

                <form method="post">
                    {% csrf_token %}

                    <!-- Поле username -->
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Имя пользователя</label>
                        <input type="text" name="username" id="id_username" class="form-control form-control-lg"
                            placeholder="Введите имя пользователя" required autofocus>
                    </div>

                    <!-- Поле password -->
                    <div class="mb-4">
                        <label for="id_password" class="form-label">Пароль</label>
                        <input type="password" name="password" id="id_password" class="form-control form-control-lg"
                            placeholder="Введите пароль" required>
                    </div>

                    <!-- Ошибки формы -->
                    {% if form.errors %}
                    <div class="alert alert-danger" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        Неверное имя пользователя или пароль
                    </div>
                    {% endif %}

                    <!-- Кнопка входа -->
                    <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                        Войти
                    </button>
                </form>

                <!-- Ссылка на регистрацию -->
                <div class="text-center mt-3">
                    <p class="mb-0 text-muted">
                        Нет аккаунта?
                        <a href="{% url 'users:register' %}" class="text-decoration-none">
                            Зарегистрироваться
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
